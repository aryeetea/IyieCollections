<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IYIÉ Style</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Manrope:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #0c0a0b;
      --cream: #f4e9dd;
      --muted: rgba(244, 233, 221, 0.42);
      --red:   #a61d33;
      --pink:  #d49aa4;
      --line:  rgba(244, 233, 221, 0.1);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--cream);
      font-family: 'Manrope', sans-serif;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 60% 0%, rgba(166, 29, 51, 0.18) 0%, transparent 60%);
      pointer-events: none;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      gap: 3rem;
    }

    /* ── Brand ── */
    .brand { text-align: center; }

    .kicker {
      font-size: 0.68rem;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(5rem, 16vw, 11rem);
      font-weight: 300;
      line-height: 1;
      letter-spacing: 0.06em;
      color: var(--cream);
    }

    .logo em { color: var(--red); font-style: italic; }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      color: var(--muted);
      margin-top: 1.2rem;
      letter-spacing: 0.04em;
    }

    /* ── Form ── */
    .form-wrap {
      width: min(380px, 100%);
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .field { position: relative; }

    .field input {
      width: 100%;
      background: transparent;
      border: 1px solid var(--line);
      border-bottom: none;
      color: var(--cream);
      padding: 1rem 1.2rem;
      font-family: 'Manrope', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: background 0.2s, border-color 0.2s;
    }

    .field:last-of-type input {
      border-bottom: 1px solid var(--line);
    }

    .field input:focus {
      background: rgba(244, 233, 221, 0.04);
      border-color: rgba(212, 154, 164, 0.5);
    }

    .field input::placeholder { color: var(--muted); }

    .btn {
      width: 100%;
      background: var(--red);
      color: var(--cream);
      border: none;
      padding: 1.1rem;
      font-family: 'Manrope', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.75rem;
      transition: filter 0.2s;
      position: relative;
    }

    .btn:hover { filter: brightness(1.1); }
    .btn:active { filter: brightness(0.95); }
    .btn.loading { color: transparent; pointer-events: none; }
    .btn.loading::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 14px; height: 14px;
      margin: -7px 0 0 -7px;
      border: 1.5px solid rgba(244, 233, 221, 0.3);
      border-top-color: var(--cream);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .form-note {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      margin-top: 1rem;
      letter-spacing: 0.04em;
    }

    .error-msg {
      display: none;
      font-size: 0.82rem;
      color: var(--pink);
      text-align: center;
      margin-top: 0.75rem;
    }

    /* ── Success ── */
    .success {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0.75rem;
      animation: rise 0.7s ease both;
    }

    .success-mark {
      font-size: 0.68rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--red);
    }

    .success h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 300;
      line-height: 1.1;
      color: var(--cream);
    }

    .success h2 em { color: var(--red); font-style: italic; }

    .success p {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.8;
      max-width: 22rem;
    }

    /* ── Footer ── */
    .foot {
      position: fixed;
      bottom: 2rem;
      font-size: 0.65rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(244, 233, 221, 0.18);
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .page { gap: 2.5rem; }
    }
  </style>
</head>
<body>

<div class="page">

  <div class="brand" id="brand">
    <p class="kicker">Private list</p>
    <div class="logo">IYI<em>É</em></div>
    <p class="tagline">For the girl who moves first.</p>
  </div>

  <div id="form-state">
    <div class="form-wrap">
      <form id="signup-form">
        <div class="field">
          <input type="text" id="firstName" placeholder="Your name" autocomplete="given-name"/>
        </div>
        <div class="field">
          <input type="email" id="email" placeholder="Email address" required autocomplete="email"/>
        </div>
        <button type="submit" class="btn" id="submit-btn">Join the circle</button>
      </form>
      <p class="error-msg" id="error-msg"></p>
      <p class="form-note">No spam. Unsubscribe anytime.</p>
    </div>
  </div>

  <div class="success" id="success-section">
    <span class="success-mark">You're in</span>
    <h2>Welcome to <em>IYIÉ.</em></h2>
    <p id="success-msg">You'll hear from us when it matters. Expect something soon.</p>
  </div>

</div>

<p class="foot">IYIÉ Style — SS 2025</p>

<script>
  const form        = document.getElementById('signup-form');
  const formState   = document.getElementById('form-state');
  const successSec  = document.getElementById('success-section');
  const submitBtn   = document.getElementById('submit-btn');
  const errorMsg    = document.getElementById('error-msg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email     = document.getElementById('email').value.trim();
    const firstName = document.getElementById('firstName').value.trim();

    if (!email || !email.includes('@')) {
      errorMsg.textContent = 'Please enter a valid email address.';
      errorMsg.style.display = 'block';
      return;
    }

    submitBtn.classList.add('loading');
    errorMsg.style.display = 'none';

    try {
      const res  = await fetch('/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, firstName })
      });
      const data = await res.json();

      if (!res.ok) {
        errorMsg.textContent = data.error || 'Something went wrong. Try again.';
        errorMsg.style.display = 'block';
        submitBtn.classList.remove('loading');
        return;
      }

      playChime();
      formState.style.display = 'none';
      if (firstName) {
        document.getElementById('success-msg').textContent =
          `${firstName}, you'll hear from us when it matters. Expect something soon.`;
      }
      successSec.style.display = 'flex';

    } catch {
      errorMsg.textContent = 'Connection error. Try again.';
      errorMsg.style.display = 'block';
      submitBtn.classList.remove('loading');
    }
  });

  function playChime() {
    try {
      const ctx   = new (window.AudioContext || window.webkitAudioContext)();
      const notes = [659.25, 880, 1108.73];
      notes.forEach((freq, i) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        const t = ctx.currentTime + i * 0.08;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.16, t + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 1.8);
        osc.start(t);
        osc.stop(t + 1.8);
      });
    } catch {}
  }
</script>
</body>
</html>
