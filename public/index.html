<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IYIÉ Style — Join the List</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #F0E6D2;
      --cream: #F7F1E7;
      --red:   #9B1B30;
      --red-d: #6d1221;
      --pink:  #C97480;
      --dark:  #251010;
      --muted: rgba(37,16,16,0.4);
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      font-family: 'Manrope', sans-serif;
      color: var(--dark);
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
    }

    /* ── Brand ── */
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(5.5rem, 16vw, 10rem);
      font-weight: 300;
      line-height: 1;
      letter-spacing: 0.06em;
      color: var(--dark);
      margin-bottom: 0.3rem;
    }
    .logo em { color: var(--red); font-style: italic; }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: var(--pink);
      margin-bottom: 3rem;
      text-align: center;
    }

    /* ── Card ── */
    .card {
      width: min(420px, 100%);
      background: var(--cream);
      border: 1px solid rgba(155,27,48,0.12);
      padding: 2.8rem 2.4rem;
    }

    .card-label {
      font-size: 0.6rem;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--pink);
      text-align: center;
      margin-bottom: 1.6rem;
    }

    .divider {
      width: 24px;
      height: 1px;
      background: var(--red);
      opacity: 0.4;
      margin: 0 auto 1.8rem;
    }

    .fields { display: flex; flex-direction: column; gap: 0.75rem; }

    .fields input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(37,16,16,0.15);
      color: var(--dark);
      padding: 0.8rem 0.25rem;
      font-family: 'Manrope', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .fields input:focus { border-bottom-color: var(--red); }
    .fields input::placeholder { color: rgba(37,16,16,0.3); }

    .btn {
      width: 100%;
      background: var(--red);
      color: var(--cream);
      border: none;
      padding: 1.05rem;
      font-family: 'Manrope', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1.4rem;
      position: relative;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--red-d); }
    .btn.loading { color: transparent; pointer-events: none; }
    .btn.loading::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 14px; height: 14px;
      margin: -7px 0 0 -7px;
      border: 1.5px solid rgba(247,241,231,0.3);
      border-top-color: var(--cream);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .error-msg {
      display: none;
      font-size: 0.78rem;
      color: var(--red);
      text-align: center;
      margin-top: 0.75rem;
    }

    .note {
      font-size: 0.62rem;
      letter-spacing: 0.02em;
      color: var(--muted);
      text-align: center;
      margin-top: 1.5rem;
    }

    /* ── Success ── */
    .success {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0.6rem;
      animation: rise 0.6s ease both;
    }

    .success-mark {
      font-size: 0.6rem;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--red);
      font-weight: 600;
    }

    .success h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      font-weight: 300;
      line-height: 1.2;
      color: var(--dark);
    }
    .success h2 em { color: var(--red); font-style: italic; }

    .success p {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.8;
    }

    .success-hint {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.5rem;
      line-height: 1.7;
    }

    .success-hint strong { color: var(--dark); }

    /* ── Watermark ── */
    .watermark-wrap {
      perspective: 1400px;
      pointer-events: none;
      margin-top: 2.5rem;
      overflow: visible;
    }

    .watermark-text {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(155,27,48,0.35);
      -webkit-text-stroke: 1px rgba(155,27,48,0.45);
      white-space: nowrap;
      animation: pendulum 4s ease-in-out infinite;
    }

    @keyframes pendulum {
      0%   { transform: rotateY(-55deg) rotateX(10deg); }
      50%  { transform: rotateY(55deg)  rotateX(10deg); }
      100% { transform: rotateY(-55deg) rotateX(10deg); }
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--dark);
      color: var(--cream);
      padding: 0.85rem 1.6rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      white-space: nowrap;
      z-index: 999;
      transition: top 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
    }
    .toast.show { top: 1.5rem; }
    .toast-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--pink);
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="toast" id="toast">
  <span class="toast-dot"></span>
  <span id="toast-msg">You've joined the list.</span>
</div>

<div class="page">

  <div class="logo">IYI<em>É</em></div>
  <p class="tagline">You can't buy taste. But you can be first.</p>

  <div class="card">
    <p class="card-label">Private list — SS 2025</p>
    <div class="divider"></div>

    <div id="form-state">
      <div class="fields">
        <input type="text"  id="firstName" placeholder="Your name"     autocomplete="given-name" autocapitalize="words"/>
        <input type="email" id="email"     placeholder="Email address" autocomplete="email" required/>
      </div>
      <button type="button" class="btn" id="submit-btn" onclick="handleSubmit()">Join the circle</button>
      <p class="error-msg" id="error-msg"></p>
      <p class="note">No noise. Unsubscribe anytime.</p>
    </div>

    <div class="success" id="success-section">
      <span class="success-mark">You're in</span>
      <h2>Your name is on<br>the <em>list.</em></h2>
      <p id="success-detail">Expect a very stylish email soon.</p>
      <p class="success-hint">Can't find it? Check your <strong>Important</strong> folder — Gmail likes to put us there.</p>
    </div>
  </div>

  <div class="watermark-wrap" aria-hidden="true">
    <span class="watermark-text">To Do It Well</span>
  </div>

</div>
<script>
  async function handleSubmit() {
    const email     = document.getElementById('email').value.trim();
    const firstName = document.getElementById('firstName').value.trim();
    const btn       = document.getElementById('submit-btn');
    const errEl     = document.getElementById('error-msg');

    if (!email || !email.includes('@')) {
      errEl.textContent = 'A valid email address, please.';
      errEl.style.display = 'block';
      return;
    }

    btn.classList.add('loading');
    errEl.style.display = 'none';

    try {
      const res  = await fetch('/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, firstName })
      });
      const data = await res.json();

      if (!res.ok) {
        errEl.textContent = data.error || 'Something went wrong. Try again.';
        errEl.style.display = 'block';
        btn.classList.remove('loading');
        return;
      }

      playChime();
      showToast(firstName ? `Welcome, ${firstName}. You're on the list.` : "You've joined the list.");
      document.getElementById('form-state').style.display = 'none';
      if (firstName) {
        document.getElementById('success-detail').textContent =
          `${firstName}, expect a very stylish email soon.`;
      }
      document.getElementById('success-section').style.display = 'flex';

    } catch {
      errEl.textContent = 'Connection error. Try again.';
      errEl.style.display = 'block';
      btn.classList.remove('loading');
    }
  }

  document.getElementById('firstName').addEventListener('input', function () {
    const pos = this.selectionStart;
    this.value = this.value.replace(/\b\w/g, c => c.toUpperCase());
    this.setSelectionRange(pos, pos);
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSubmit();
  });

  function showToast(msg) {
    const toast = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 4000);
  }

  function playChime() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [659.25, 880, 1108.73].forEach((freq, i) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        const t = ctx.currentTime + i * 0.08;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.16, t + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 1.8);
        osc.start(t); osc.stop(t + 1.8);
      });
    } catch {}
  }
</script>
</body>
</html>
