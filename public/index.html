<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IYIÉ Style — You're Invited</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #8B1525;
      --cream: #f4e9dd;
      --pink:  #f0b4bc;
      --dark:  #2a080f;
      --red:   #6d0f1c;
      --muted: rgba(240,180,188,0.55);
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      font-family: 'Manrope', sans-serif;
      color: var(--pink);
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem 9rem;
      gap: 2rem;
      position: relative;
    }

    /* ── Brand ── */
    .brand { text-align: center; }

    .kicker {
      font-size: 0.65rem;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(5rem, 14vw, 9rem);
      font-weight: 300;
      line-height: 1;
      letter-spacing: 0.06em;
      color: var(--cream);
    }

    .logo em { color: var(--pink); font-style: italic; }

    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      color: var(--muted);
      margin-top: 0.5rem;
    }

    /* ── Envelope wrapper ── */
    .env-wrapper {
      position: relative;
      width: min(460px, 100%);
    }

    /* ── Invitation card ── */
    .card {
      position: relative;
      background: var(--cream);
      padding: 2rem 2rem 1.6rem;
      color: var(--dark);
      z-index: 2;
      box-shadow: 0 8px 48px rgba(0,0,0,0.3);
      animation: rise 0.7s ease both;
    }

    .card-rule {
      width: 28px;
      height: 2px;
      background: var(--bg);
      margin: 0 auto 1rem;
    }

    .card-heading {
      font-size: 0.65rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(42,8,15,0.45);
      text-align: center;
      margin-bottom: 1.2rem;
    }

    /* ── Form ── */
    #signup-form {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .field input {
      width: 100%;
      background: rgba(139,21,37,0.06);
      border: 1px solid rgba(42,8,15,0.12);
      color: var(--dark);
      padding: 0.85rem 1rem;
      font-family: 'Manrope', sans-serif;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .field input:focus {
      border-color: var(--bg);
      background: rgba(139,21,37,0.04);
    }

    .field input::placeholder { color: rgba(42,8,15,0.3); }

    .btn {
      width: 100%;
      background: var(--bg);
      color: var(--cream);
      border: none;
      padding: 1rem;
      font-family: 'Manrope', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.35rem;
      transition: background 0.2s;
      position: relative;
    }

    .btn:hover { background: var(--red); }
    .btn.loading { color: transparent; pointer-events: none; }
    .btn.loading::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 14px; height: 14px;
      margin: -7px 0 0 -7px;
      border: 1.5px solid rgba(244,233,221,0.3);
      border-top-color: var(--cream);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .error-msg {
      display: none;
      font-size: 0.78rem;
      color: var(--red);
      text-align: center;
      margin-top: 0.4rem;
    }

    .form-note {
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      color: rgba(42,8,15,0.42);
      text-align: center;
      margin-top: 1rem;
      padding-top: 0.9rem;
      border-top: 1px solid rgba(42,8,15,0.08);
    }

    /* ── Success state ── */
    .success {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0.5rem;
      padding: 0.5rem 0;
      animation: rise 0.6s ease both;
    }

    .success-mark {
      font-size: 0.65rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--bg);
      font-weight: 600;
    }

    .success h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      font-weight: 300;
      line-height: 1.1;
      color: var(--dark);
    }

    .success h2 em { color: var(--bg); font-style: italic; }

    .success p {
      font-size: 0.85rem;
      color: rgba(42,8,15,0.55);
      line-height: 1.8;
    }

    /* ── Open envelope base (cream) ── */
    .env {
      position: relative;
      width: 100%;
      height: 140px;
      z-index: 1;
    }

    .env-back {
      position: absolute;
      inset: 0;
      background: #ede0d0;
    }

    .fold { position: absolute; inset: 0; }
    .fold-l { background: #e5d8c8; clip-path: polygon(0 0, 50% 50%, 0 100%); }
    .fold-r { background: #e5d8c8; clip-path: polygon(100% 0, 50% 50%, 100% 100%); }
    .fold-b { background: #ddd0be; clip-path: polygon(0 100%, 50% 44%, 100% 100%); }

    .env-front {
      position: absolute;
      inset: 0;
      background: #ede0d0;
      z-index: 1;
    }

    /* Flap — already open (folded back) */
    .env-flap {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 70px;
      background: #e8dbc9;
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      transform-origin: center top;
      transform: rotateX(-175deg);
      backface-visibility: hidden;
      z-index: 2;
    }

    /* Wax seal on envelope */
    .env-seal {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 8px;
      letter-spacing: 1px;
      color: var(--cream);
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
      pointer-events: none;
      z-index: 3;
    }

    /* Fly away on success */
    @keyframes fly {
      0%   { transform: translate(0,0)      scale(1)    rotate(0deg);  opacity: 1; }
      100% { transform: translate(110vw,-60vh) scale(0.1) rotate(20deg); opacity: 0; }
    }
    .env-wrapper.flying { animation: fly 0.9s cubic-bezier(0.5,0,0.8,0) forwards; }

    /* ── Sent message ── */
    .sent-msg {
      text-align: center;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .sent-msg.visible { opacity: 1; transform: translateY(0); }

    .sent-msg p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--muted);
    }

    /* ── 3D watermark ── */
    .watermark {
      position: fixed;
      bottom: -1rem;
      left: 50%;
      transform: translateX(-50%);
      perspective: 1400px;
      pointer-events: none;
      z-index: 0;
      white-space: nowrap;
    }

    .watermark-text {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 7vw, 6rem);
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: transparent;
      -webkit-text-stroke: 1px rgba(240,180,188,0.22);
      animation: spin3d 16s linear infinite;
    }

    @keyframes spin3d {
      from { transform: rotateY(0deg) rotateX(10deg); }
      to   { transform: rotateY(360deg) rotateX(10deg); }
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .card { padding: 1.6rem 1.2rem 1.4rem; }
      .env { height: 120px; }
      .env-flap { height: 60px; }
    }
  </style>
</head>
<body>

<div class="page">

  <header class="brand">
    <p class="kicker">SS 2025 — Private list</p>
    <div class="logo">IYI<em>É</em></div>
    <p class="tagline">You can't buy taste. But you can be first.</p>
  </header>

  <div class="env-wrapper" id="env-wrapper">

    <!-- Card already out of envelope -->
    <div class="card" id="card">
      <div class="card-rule"></div>
      <p class="card-heading">You have been cordially selected</p>

      <div id="form-state">
        <form id="signup-form">
          <div class="field">
            <input type="text" id="firstName" placeholder="Your name" autocomplete="given-name"/>
          </div>
          <div class="field">
            <input type="email" id="email" placeholder="Email address" required autocomplete="email"/>
          </div>
          <button type="submit" class="btn" id="submit-btn">RSVP — I'm in</button>
          <p class="error-msg" id="error-msg"></p>
        </form>
        <p class="form-note">No junk mail. Unsubscribe anytime, no hard feelings.</p>
      </div>

      <div class="success" id="success-section">
        <span class="success-mark">RSVP accepted</span>
        <h2>Your name is on<br>the <em>list.</em></h2>
        <p id="success-msg">Expect a very stylish email soon.</p>
      </div>
    </div>

    <!-- Open envelope below the card -->
    <div class="env" id="envelope">
      <div class="env-back">
        <div class="fold fold-l"></div>
        <div class="fold fold-r"></div>
        <div class="fold fold-b"></div>
      </div>
      <div class="env-front">
        <div class="env-seal">IYIÉ</div>
      </div>
      <div class="env-flap"></div>
    </div>

  </div>

  <div class="sent-msg" id="sent-msg">
    <p>Sealed, stamped, and on its way to you.</p>
  </div>

</div>

<div class="watermark" aria-hidden="true">
  <span class="watermark-text">To Do It Well</span>
</div>

<script>
  const formState  = document.getElementById('form-state');
  const successSec = document.getElementById('success-section');
  const wrapper    = document.getElementById('env-wrapper');
  const sentMsg    = document.getElementById('sent-msg');

  document.getElementById('signup-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email     = document.getElementById('email').value.trim();
    const firstName = document.getElementById('firstName').value.trim();
    const btn       = document.getElementById('submit-btn');
    const errEl     = document.getElementById('error-msg');

    if (!email || !email.includes('@')) {
      errEl.textContent = 'A valid email address, please.';
      errEl.style.display = 'block';
      return;
    }

    btn.classList.add('loading');
    errEl.style.display = 'none';

    try {
      const res  = await fetch('/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, firstName })
      });
      const data = await res.json();

      if (!res.ok) {
        errEl.textContent = data.error || 'Something went wrong. Try again.';
        errEl.style.display = 'block';
        btn.classList.remove('loading');
        return;
      }

      playChime();

      formState.style.display = 'none';
      if (firstName) {
        document.getElementById('success-msg').textContent =
          `${firstName}, expect a very stylish email soon.`;
      }
      successSec.style.display = 'flex';

      // Envelope flies away after success
      setTimeout(() => wrapper.classList.add('flying'), 1800);
      setTimeout(() => sentMsg.classList.add('visible'), 2500);

    } catch {
      errEl.textContent = 'Connection error. Try again.';
      errEl.style.display = 'block';
      btn.classList.remove('loading');
    }
  });

  function playChime() {
    try {
      const ctx   = new (window.AudioContext || window.webkitAudioContext)();
      const notes = [659.25, 880, 1108.73];
      notes.forEach((freq, i) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        const t = ctx.currentTime + i * 0.08;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.16, t + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + 1.8);
        osc.start(t);
        osc.stop(t + 1.8);
      });
    } catch {}
  }
</script>
</body>
</html>
